# Unsubscribes from notification threads of closed issues and pull requests.
# Requires a classic personal access token with "notifications" scope stored
# as NOTIFICATION_TOKEN repository secret.
name: 🔕 Unsubscribe closed threads
"on":
  schedule:
    # Run weekly, every Monday at 9:13 UTC.
    - cron: "13 9 * * 1"
  push:
    branches: ["main"]
    paths: [".github/workflows/unsubscribe.yaml"]
  workflow_dispatch:
    inputs:
      months:
        description: "Unsubscribe from closed issues/PRs inactive for more than this many months"
        default: "3"
        type: string
      batch-size:
        description: "Max threads to inspect per run (backlog clears over successive runs)"
        default: "200"
        type: string
      dry-run:
        description: "Dry-run: only list candidates, do not perform unsubscribing"
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  unsubscribe:
    runs-on: ubuntu-slim
    steps:
      - name: Check NOTIFICATION_TOKEN
        run: >
          ${{ secrets.NOTIFICATION_TOKEN
          && 'true'
          || 'echo "::error::NOTIFICATION_TOKEN secret is not set.
          Create a classic PAT at https://github.com/settings/tokens/new?scopes=notifications
          then add it at https://github.com/${{ github.repository }}/settings/secrets/actions
          as a repository secret named NOTIFICATION_TOKEN.
          Fine-grained PATs are not supported (the notifications API requires a classic PAT)."; exit 1' }}

      - name: Validate token permissions
        env:
          GH_TOKEN: ${{ secrets.NOTIFICATION_TOKEN }}
        run: |
          # Smoke-test the notifications API with a minimal GET request
          response=$(gh api -i --method GET "/notifications?per_page=1&all=false" 2>&1 || true)

          # Extract HTTP status code
          status=$(echo "$response" | head -1)
          echo "HTTP status line: $status"

          # X-OAuth-Scopes header reveals the token's granted scopes.
          # Classic PATs always include this header; fine-grained PATs never do.
          scopes=$(echo "$response" | grep -i '^x-oauth-scopes:' | sed 's/^[^:]*: *//' | tr -d '\r\n')
          echo "X-OAuth-Scopes: '${scopes:-<not present>}'"

          # Check the request succeeded
          if echo "$status" | grep -q "^HTTP/.* [45]"; then
            message=$(echo "$response" | sed -n '/^\r*$/,$ p' | tail -n +2 | jq -r '.message // empty' 2>/dev/null || true)
            echo "::error::NOTIFICATION_TOKEN cannot access the notifications API (${status})."
            if [ -n "$message" ]; then
              echo "::error::GitHub says: $message"
            fi
            if [ -z "$scopes" ]; then
              echo "::error::No X-OAuth-Scopes header found. This token is likely a fine-grained PAT, which does not support the notifications API."
              echo "::error::Create a classic PAT at https://github.com/settings/tokens/new?scopes=notifications and save it as the NOTIFICATION_TOKEN repository secret."
            else
              echo "::error::Token scopes: '$scopes'. The 'notifications' scope is required."
            fi
            exit 1
          fi

          if [ -z "$scopes" ]; then
            echo "::error::No X-OAuth-Scopes header found. NOTIFICATION_TOKEN must be a classic PAT (fine-grained PATs are not supported)."
            exit 1
          fi

          if [ "$scopes" != "notifications" ]; then
            echo "::warning::NOTIFICATION_TOKEN has more scopes than needed: '$scopes'. Only 'notifications' is required."
          fi

          echo "Token validated: scopes='$scopes'"

      - name: Unsubscribe from closed issues and PRs
        env:
          GH_TOKEN: ${{ secrets.NOTIFICATION_TOKEN }}
          MONTHS: ${{ inputs.months || '3' }}
          BATCH_SIZE: ${{ inputs.batch-size || '200' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run != false && 'true' || 'false' }}
        run: |
          set -o pipefail

          cutoff=$(date -u -d "${MONTHS} months ago" +%Y-%m-%dT%H:%M:%SZ)
          mode="dry-run"
          if [ "$DRY_RUN" = "false" ]; then
            mode="live"
          fi

          # Write report header (results section is appended after processing)
          echo "## 🔕 Unsubscribe report ($mode)" > "$GITHUB_STEP_SUMMARY"

          # Write table rows to a temp file (counters don't survive the pipe subshell)
          rows=$(mktemp)

          # Fetch all notification threads (read and unread), then filter to
          # Issues and PRs. Using all=true ensures we also catch subscriptions
          # where the notification was read but never unsubscribed.
          # Re-processing is safe: DELETE /notifications/threads/{id}/subscription
          # is idempotent. The API has no server-side filter for issue/PR state
          # or sort direction, so all filtering happens client-side.
          echo "::group::Fetching notification threads..."
          all_threads=$(mktemp)
          gh api --method GET /notifications --paginate \
            -f all=true \
            -f per_page=50 | \
            jq -c --slurp '[.[][] | select(.subject.type == "Issue" or .subject.type == "PullRequest")] | reverse | .[]' \
            > "$all_threads"
          all_total=$(wc -l < "$all_threads" | tr -d ' ')
          echo "Found $all_total issue/PR notification threads total."

          # Limit to batch size to avoid long runs; backlog clears over
          # successive scheduled runs.
          threads=$(mktemp)
          head -n "$BATCH_SIZE" "$all_threads" > "$threads"
          rm -f "$all_threads"
          total=$(wc -l < "$threads" | tr -d ' ')
          remaining=$((all_total - total))
          echo "Inspecting $total threads (batch size: $BATCH_SIZE, remaining: $remaining)."
          echo "::endgroup::"

          n=0
          oldest_updated=""
          newest_updated=""
          count_open=0
          count_closed_recent=0
          count_closed_stale=0
          count_unknown=0
          while IFS= read -r thread; do
            n=$((n + 1))
            id=$(echo "$thread" | jq -r '.id')
            url=$(echo "$thread" | jq -r '.subject.url')
            title=$(echo "$thread" | jq -r '.subject.title')
            repo=$(echo "$thread" | jq -r '.repository.full_name')
            type=$(echo "$thread" | jq -r '.subject.type')

            echo "[$n/$total] Checking $repo - $title..."

            # Fetch issue/PR state, last activity date, and web URL
            data=$(gh api "$url" -q '{state: .state, updated_at: .updated_at, html_url: .html_url, number: .number}' 2>/dev/null || echo '{}')
            state=$(echo "$data" | jq -r '.state // "unknown"')
            updated_at=$(echo "$data" | jq -r '.updated_at // empty')
            html_url=$(echo "$data" | jq -r '.html_url // empty')
            number=$(echo "$data" | jq -r '.number // empty')

            # Track oldest and newest activity dates
            if [ -n "$updated_at" ]; then
              if [ -z "$oldest_updated" ] || [ "$updated_at" \< "$oldest_updated" ]; then
                oldest_updated="$updated_at"
              fi
              if [ -z "$newest_updated" ] || [ "$updated_at" \> "$newest_updated" ]; then
                newest_updated="$updated_at"
              fi
            fi

            # Match closed threads inactive past the cutoff
            if [ "$state" = "unknown" ] || [ -z "$updated_at" ]; then
              count_unknown=$((count_unknown + 1))
              echo "  → skipped (state=$state)"
            elif [ "$state" != "closed" ]; then
              count_open=$((count_open + 1))
              echo "  → skipped (state=$state)"
            elif [ "$updated_at" \> "$cutoff" ] || [ "$updated_at" = "$cutoff" ]; then
              count_closed_recent=$((count_closed_recent + 1))
              echo "  → skipped (closed, but active: $updated_at > cutoff $cutoff)"
            else
              count_closed_stale=$((count_closed_stale + 1))
              ref="$repo"
              if [ -n "$number" ] && [ -n "$html_url" ]; then
                ref="[\`${repo}#${number}\`]($html_url)"
              fi
              now_epoch=$(date -u +%s)
              then_epoch=$(date -u -d "$updated_at" +%s)
              days_ago=$(( (now_epoch - then_epoch) / 86400 ))
              ago="${days_ago} days ago"
              if [ "$DRY_RUN" = "true" ]; then
                echo "  → 🔍 candidate (closed, last activity: $updated_at)"
                echo "| $title | $ref | $ago | 👁️ Dry-run |" >> "$rows"
              elif gh api "/notifications/threads/$id/subscription" -X DELETE 2>/dev/null; then
                # Mark as read so the thread won't appear in future runs
                gh api "/notifications/threads/$id" -X PATCH 2>/dev/null || true
                echo "  → 🔕 unsubscribed (closed, last activity: $updated_at)"
                echo "| $title | $ref | $ago | 🔕 Unsubscribed |" >> "$rows"
              else
                echo "  → ❌ failed (closed, last activity: $updated_at)"
                echo "| $title | $ref | $ago | ⚠️ Failed |" >> "$rows"
              fi
            fi
          done < "$threads"
          rm -f "$threads"

          echo "---"
          echo "Inspected $n threads."

          # Append results, stats, then table to the summary
          found=$(wc -l < "$rows" 2>/dev/null || echo 0)
          {
            echo ""
            if [ "$DRY_RUN" = "true" ]; then
              echo "🔍 **Candidates found:** $found — cutoff: \`$cutoff\` (inactive for more than ${MONTHS} months, dry-run)"
            else
              unsubscribed=$(grep -c '🔕' "$rows" || true)
              failed=$(grep -c '⚠️' "$rows" || true)
              echo "🔕 **Unsubscribed:** $unsubscribed | ⚠️ **Failed:** $failed — cutoff: \`$cutoff\` (inactive for more than ${MONTHS} months)"
            fi
            echo ""
            echo "### 📊 Batch details"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| 🔔 Total notifications | $all_total |"
            echo "| 📦 Batch size | $BATCH_SIZE |"
            echo "| 🔎 Inspected | $n |"
            echo "| 📋 Remaining backlog | $remaining |"
            echo "| ⏪ Oldest activity | ${oldest_updated:--} |"
            echo "| ⏩ Newest activity | ${newest_updated:--} |"
            echo "| ✂️ Cutoff | $cutoff |"
            echo ""
            echo "### 🏷️ Breakdown by state"
            echo ""
            echo "| State | Count |"
            echo "| --- | --- |"
            echo "| 🟢 Open | $count_open |"
            echo "| 🟡 Closed (active since cutoff) | $count_closed_recent |"
            echo "| 🔴 Closed (inactive, eligible) | $count_closed_stale |"
            echo "| ⚪ Unknown | $count_unknown |"
            if [ -n "$oldest_updated" ] && [ "$remaining" -gt 0 ] \
                && { [ "$oldest_updated" \> "$cutoff" ] || [ "$oldest_updated" = "$cutoff" ]; }; then
              echo ""
              echo "> [!WARNING]"
              echo "> Oldest activity seen in this batch: \`$oldest_updated\` (cutoff: \`$cutoff\`)."
              echo "> The notification API does not sort by issue activity, so the current"
              echo "> batch of $total threads did not reach any old-enough candidates."
              echo "> Consider increasing \`batch-size\` (currently $BATCH_SIZE) or running manually"
              echo "> with a larger batch to clear the backlog faster."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$found" -gt 0 ]; then
            {
              echo ""
              echo "---"
              echo ""
              echo "### 📝 Details"
              echo ""
              echo "| 💬 Title | 🔗 Link | 🕐 Last activity | ⚡ Action |"
              echo "| --- | --- | --- | --- |"
            } >> "$GITHUB_STEP_SUMMARY"
            cat "$rows" >> "$GITHUB_STEP_SUMMARY"
          fi

          rm -f "$rows"

      - name: Unsubscribe via GraphQL (threadless subscriptions)
        env:
          GH_TOKEN: ${{ secrets.NOTIFICATION_TOKEN }}
          MONTHS: ${{ inputs.months || '3' }}
          BATCH_SIZE: ${{ inputs.batch-size || '200' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run != false && 'true' || 'false' }}
        run: |
          set -o pipefail

          cutoff=$(date -u -d "${MONTHS} months ago" +%Y-%m-%dT%H:%M:%SZ)
          cutoff_date=$(date -u -d "${MONTHS} months ago" +%Y-%m-%d)
          mode="dry-run"
          if [ "$DRY_RUN" = "false" ]; then
            mode="live"
          fi

          # --- Permission check ---
          username=$(gh api /user -q '.login')
          echo "Authenticated as: $username"

          if ! gh api graphql -f query='query { viewer { login } }' -q '.data.viewer.login' > /dev/null 2>&1; then
            echo "::warning::GraphQL API not accessible with current token. Skipping threadless subscription cleanup."
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "---" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## 🔕 Threadless subscriptions ($mode)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> [!WARNING]" >> "$GITHUB_STEP_SUMMARY"
            echo "> GraphQL API not accessible with current token. Skipping." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # --- Search for closed issues/PRs the user is involved in ---
          echo "::group::Searching for threadless subscriptions via GraphQL..."
          search_query="involves:${username} is:closed updated:<${cutoff_date}"
          echo "Search query: $search_query"

          nodes=$(mktemp)
          cursor=""
          fetched=0

          while true; do
            if [ -z "$cursor" ]; then
              after_arg=""
            else
              after_arg=", after: \"$cursor\""
            fi

            remaining=$((BATCH_SIZE - fetched))
            if [ "$remaining" -le 0 ]; then
              break
            fi
            page_size=$remaining
            if [ "$page_size" -gt 100 ]; then
              page_size=100
            fi

            result=$(gh api graphql -f query='
              query($q: String!) {
                search(query: $q, type: ISSUE, first: '"$page_size"''"$after_arg"') {
                  pageInfo { hasNextPage endCursor }
                  nodes {
                    ... on Issue {
                      __typename
                      id
                      number
                      title
                      updatedAt
                      viewerSubscription
                      repository { nameWithOwner }
                      url
                    }
                    ... on PullRequest {
                      __typename
                      id
                      number
                      title
                      updatedAt
                      viewerSubscription
                      repository { nameWithOwner }
                      url
                    }
                  }
                }
              }
            ' -f q="$search_query")

            echo "$result" | jq -c '.data.search.nodes[]' >> "$nodes"
            page_count=$(echo "$result" | jq '.data.search.nodes | length')
            fetched=$((fetched + page_count))

            has_next=$(echo "$result" | jq -r '.data.search.pageInfo.hasNextPage')
            if [ "$has_next" != "true" ]; then
              break
            fi
            cursor=$(echo "$result" | jq -r '.data.search.pageInfo.endCursor')
            echo "  Fetched $fetched items so far..."
          done

          all_total=$(wc -l < "$nodes" | tr -d ' ')
          echo "Found $all_total closed issues/PRs involving $username."
          echo "::endgroup::"

          # --- Filter and unsubscribe ---
          rows=$(mktemp)
          n=0
          count_not_subscribed=0
          count_subscribed=0

          while IFS= read -r node; do
            n=$((n + 1))
            subscription=$(echo "$node" | jq -r '.viewerSubscription // "UNSUBSCRIBED"')
            if [ "$subscription" != "SUBSCRIBED" ]; then
              count_not_subscribed=$((count_not_subscribed + 1))
              continue
            fi

            count_subscribed=$((count_subscribed + 1))
            node_id=$(echo "$node" | jq -r '.id')
            title=$(echo "$node" | jq -r '.title')
            repo=$(echo "$node" | jq -r '.repository.nameWithOwner')
            number=$(echo "$node" | jq -r '.number')
            html_url=$(echo "$node" | jq -r '.url')
            updated_at=$(echo "$node" | jq -r '.updatedAt')
            typename=$(echo "$node" | jq -r '.__typename')

            ref="[\`${repo}#${number}\`]($html_url)"
            now_epoch=$(date -u +%s)
            then_epoch=$(date -u -d "$updated_at" +%s)
            days_ago=$(( (now_epoch - then_epoch) / 86400 ))
            ago="${days_ago} days ago"

            echo "[$n/$all_total] $repo#$number - $title ($typename, subscription=$subscription)"

            if [ "$DRY_RUN" = "true" ]; then
              echo "  → 🔍 candidate (subscribed, last activity: $updated_at)"
              echo "| $title | $ref | $ago | 👁️ Dry-run |" >> "$rows"
            elif gh api graphql -f query='
              mutation($id: ID!) {
                updateSubscription(input: {subscribableId: $id, state: UNSUBSCRIBED}) {
                  subscribable { viewerSubscription }
                }
              }
            ' -f id="$node_id" > /dev/null 2>&1; then
              echo "  → 🔕 unsubscribed (last activity: $updated_at)"
              echo "| $title | $ref | $ago | 🔕 Unsubscribed |" >> "$rows"
            else
              echo "  → ❌ failed (last activity: $updated_at)"
              echo "| $title | $ref | $ago | ⚠️ Failed |" >> "$rows"
            fi
          done < "$nodes"
          rm -f "$nodes"

          echo "---"
          echo "Inspected $n items: $count_subscribed subscribed, $count_not_subscribed not subscribed."

          # --- Report ---
          found=$(wc -l < "$rows" 2>/dev/null || echo 0)
          {
            echo ""
            echo "---"
            echo ""
            echo "## 🔕 Threadless subscriptions ($mode)"
            echo ""
            if [ "$DRY_RUN" = "true" ]; then
              echo "🔍 **Candidates found:** $found — cutoff: \`$cutoff\` (inactive for more than ${MONTHS} months, dry-run)"
            else
              unsubscribed=$(grep -c '🔕' "$rows" || true)
              failed=$(grep -c '⚠️' "$rows" || true)
              echo "🔕 **Unsubscribed:** $unsubscribed | ⚠️ **Failed:** $failed — cutoff: \`$cutoff\` (inactive for more than ${MONTHS} months)"
            fi
            echo ""
            echo "### 📊 Search details"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| 🔎 Search query | \`involves:${username} is:closed updated:<${cutoff_date}\` |"
            echo "| 🔔 Total results | $all_total |"
            echo "| 📦 Batch size | $BATCH_SIZE |"
            echo "| ✅ Still subscribed | $count_subscribed |"
            echo "| ⏭️ Not subscribed | $count_not_subscribed |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$found" -gt 0 ]; then
            {
              echo ""
              echo "### 📝 Details"
              echo ""
              echo "| 💬 Title | 🔗 Link | 🕐 Last activity | ⚡ Action |"
              echo "| --- | --- | --- | --- |"
            } >> "$GITHUB_STEP_SUMMARY"
            cat "$rows" >> "$GITHUB_STEP_SUMMARY"
          fi

          rm -f "$rows"
