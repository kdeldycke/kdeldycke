# Unsubscribes from notification threads of closed issues and pull requests.
# Requires a classic personal access token with "notifications" scope stored
# as NOTIFICATION_TOKEN repository secret.
name: рџ”• Unsubscribe closed threads
"on":
  schedule:
    # Run weekly, every Monday at 9:13 UTC.
    - cron: "13 9 * * 1"
  push:
    branches: ["main"]
    paths: [".github/workflows/unsubscribe.yaml"]
  workflow_dispatch:
    inputs:
      months:
        description: "Unsubscribe from closed issues/PRs inactive for more than this many months"
        default: "3"
        type: string
      batch-size:
        description: "Max threads to inspect per run (backlog clears over successive runs)"
        default: "200"
        type: string
      dry-run:
        description: "Dry-run: only list candidates, do not perform unsubscribing"
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  unsubscribe:
    runs-on: ubuntu-slim
    steps:
      - name: Check NOTIFICATION_TOKEN
        run: >
          ${{ secrets.NOTIFICATION_TOKEN
          && 'true'
          || 'echo "::error::NOTIFICATION_TOKEN secret is not set.
          Create a classic PAT at https://github.com/settings/tokens/new?scopes=notifications
          then add it at https://github.com/${{ github.repository }}/settings/secrets/actions
          as a repository secret named NOTIFICATION_TOKEN.
          Fine-grained PATs are not supported (the notifications API requires a classic PAT)."; exit 1' }}

      - name: Validate token permissions
        env:
          GH_TOKEN: ${{ secrets.NOTIFICATION_TOKEN }}
        run: |
          # Smoke-test the notifications API with a minimal GET request
          response=$(gh api -i --method GET "/notifications?per_page=1&all=false" 2>&1 || true)

          # Extract HTTP status code
          status=$(echo "$response" | head -1)
          echo "HTTP status line: $status"

          # X-OAuth-Scopes header reveals the token's granted scopes.
          # Classic PATs always include this header; fine-grained PATs never do.
          scopes=$(echo "$response" | grep -i '^x-oauth-scopes:' | sed 's/^[^:]*: *//' | tr -d '\r\n')
          echo "X-OAuth-Scopes: '${scopes:-<not present>}'"

          # Check the request succeeded
          if echo "$status" | grep -q "^HTTP/.* [45]"; then
            message=$(echo "$response" | sed -n '/^\r*$/,$ p' | tail -n +2 | jq -r '.message // empty' 2>/dev/null || true)
            echo "::error::NOTIFICATION_TOKEN cannot access the notifications API (${status})."
            if [ -n "$message" ]; then
              echo "::error::GitHub says: $message"
            fi
            if [ -z "$scopes" ]; then
              echo "::error::No X-OAuth-Scopes header found. This token is likely a fine-grained PAT, which does not support the notifications API."
              echo "::error::Create a classic PAT at https://github.com/settings/tokens/new?scopes=notifications and save it as the NOTIFICATION_TOKEN repository secret."
            else
              echo "::error::Token scopes: '$scopes'. The 'notifications' scope is required."
            fi
            exit 1
          fi

          if [ -z "$scopes" ]; then
            echo "::error::No X-OAuth-Scopes header found. NOTIFICATION_TOKEN must be a classic PAT (fine-grained PATs are not supported)."
            exit 1
          fi

          if [ "$scopes" != "notifications" ]; then
            echo "::warning::NOTIFICATION_TOKEN has more scopes than needed: '$scopes'. Only 'notifications' is required."
          fi

          echo "Token validated: scopes='$scopes'"

      - name: Unsubscribe from closed issues and PRs
        env:
          GH_TOKEN: ${{ secrets.NOTIFICATION_TOKEN }}
          MONTHS: ${{ inputs.months || '3' }}
          BATCH_SIZE: ${{ inputs.batch-size || '200' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run != false && 'true' || 'false' }}
        run: |
          set -o pipefail

          cutoff=$(date -u -d "${MONTHS} months ago" +%Y-%m-%dT%H:%M:%SZ)
          mode="dry-run"
          if [ "$DRY_RUN" = "false" ]; then
            mode="live"
          fi

          # Write report header (results section is appended after processing)
          echo "## рџ”• Unsubscribe report ($mode)" > "$GITHUB_STEP_SUMMARY"

          # Write table rows to a temp file (counters don't survive the pipe subshell)
          rows=$(mktemp)

          # Fetch unread notification threads, then filter to Issues and PRs.
          # Only unread threads are fetched (no all=true) so that threads
          # marked as read after unsubscribing don't reappear in future runs.
          # The API has no server-side filter for issue/PR state or sort
          # direction, so all filtering happens client-side.
          echo "::group::Fetching notification threads..."
          all_threads=$(mktemp)
          gh api --method GET /notifications --paginate \
            -f per_page=50 | \
            jq -c --slurp '[.[][] | select(.subject.type == "Issue" or .subject.type == "PullRequest")] | reverse | .[]' \
            > "$all_threads"
          all_total=$(wc -l < "$all_threads" | tr -d ' ')
          echo "Found $all_total issue/PR notification threads total."

          # Limit to batch size to avoid long runs; backlog clears over
          # successive scheduled runs.
          threads=$(mktemp)
          head -n "$BATCH_SIZE" "$all_threads" > "$threads"
          rm -f "$all_threads"
          total=$(wc -l < "$threads" | tr -d ' ')
          remaining=$((all_total - total))
          echo "Inspecting $total threads (batch size: $BATCH_SIZE, remaining: $remaining)."
          echo "::endgroup::"

          n=0
          oldest_updated=""
          newest_updated=""
          count_open=0
          count_closed_recent=0
          count_closed_stale=0
          count_unknown=0
          while IFS= read -r thread; do
            n=$((n + 1))
            id=$(echo "$thread" | jq -r '.id')
            url=$(echo "$thread" | jq -r '.subject.url')
            title=$(echo "$thread" | jq -r '.subject.title')
            repo=$(echo "$thread" | jq -r '.repository.full_name')
            type=$(echo "$thread" | jq -r '.subject.type')

            echo "[$n/$total] Checking $repo - $title..."

            # Fetch issue/PR state, last activity date, and web URL
            data=$(gh api "$url" -q '{state: .state, updated_at: .updated_at, html_url: .html_url, number: .number}' 2>/dev/null || echo '{}')
            state=$(echo "$data" | jq -r '.state // "unknown"')
            updated_at=$(echo "$data" | jq -r '.updated_at // empty')
            html_url=$(echo "$data" | jq -r '.html_url // empty')
            number=$(echo "$data" | jq -r '.number // empty')

            # Track oldest and newest activity dates
            if [ -n "$updated_at" ]; then
              if [ -z "$oldest_updated" ] || [ "$updated_at" \< "$oldest_updated" ]; then
                oldest_updated="$updated_at"
              fi
              if [ -z "$newest_updated" ] || [ "$updated_at" \> "$newest_updated" ]; then
                newest_updated="$updated_at"
              fi
            fi

            # Match closed threads inactive past the cutoff
            if [ "$state" = "unknown" ] || [ -z "$updated_at" ]; then
              count_unknown=$((count_unknown + 1))
              echo "  в†’ skipped (state=$state)"
            elif [ "$state" != "closed" ]; then
              count_open=$((count_open + 1))
              echo "  в†’ skipped (state=$state)"
            elif [ "$updated_at" \> "$cutoff" ] || [ "$updated_at" = "$cutoff" ]; then
              count_closed_recent=$((count_closed_recent + 1))
              echo "  в†’ skipped (closed, but active: $updated_at > cutoff $cutoff)"
            else
              count_closed_stale=$((count_closed_stale + 1))
              ref="$repo"
              if [ -n "$number" ] && [ -n "$html_url" ]; then
                ref="[\`${repo}#${number}\`]($html_url)"
              fi
              now_epoch=$(date -u +%s)
              then_epoch=$(date -u -d "$updated_at" +%s)
              days_ago=$(( (now_epoch - then_epoch) / 86400 ))
              ago="${days_ago} days ago"
              if [ "$DRY_RUN" = "true" ]; then
                echo "  в†’ рџ”Ќ candidate (closed, last activity: $updated_at)"
                echo "| $title | $ref | $ago | рџ‘ЃпёЏ Dry-run |" >> "$rows"
              elif gh api "/notifications/threads/$id/subscription" -X DELETE 2>/dev/null; then
                # Mark as read so the thread won't appear in future runs
                gh api "/notifications/threads/$id" -X PATCH 2>/dev/null || true
                echo "  в†’ рџ”• unsubscribed (closed, last activity: $updated_at)"
                echo "| $title | $ref | $ago | рџ”• Unsubscribed |" >> "$rows"
              else
                echo "  в†’ вќЊ failed (closed, last activity: $updated_at)"
                echo "| $title | $ref | $ago | вљ пёЏ Failed |" >> "$rows"
              fi
            fi
          done < "$threads"
          rm -f "$threads"

          echo "---"
          echo "Inspected $n threads."

          # Append results, stats, then table to the summary
          found=$(wc -l < "$rows" 2>/dev/null || echo 0)
          {
            echo ""
            if [ "$DRY_RUN" = "true" ]; then
              echo "рџ”Ќ **Candidates found:** $found вЂ” cutoff: \`$cutoff\` (inactive for more than ${MONTHS} months, dry-run)"
            else
              unsubscribed=$(grep -c 'рџ”•' "$rows" || true)
              failed=$(grep -c 'вљ пёЏ' "$rows" || true)
              echo "рџ”• **Unsubscribed:** $unsubscribed | вљ пёЏ **Failed:** $failed вЂ” cutoff: \`$cutoff\` (inactive for more than ${MONTHS} months)"
            fi
            echo ""
            echo "### рџ“Љ Batch details"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| рџ”” Total notifications | $all_total |"
            echo "| рџ“¦ Batch size | $BATCH_SIZE |"
            echo "| рџ”Ћ Inspected | $n |"
            echo "| рџ“‹ Remaining backlog | $remaining |"
            echo "| вЏЄ Oldest activity | ${oldest_updated:--} |"
            echo "| вЏ© Newest activity | ${newest_updated:--} |"
            echo "| вњ‚пёЏ Cutoff | $cutoff |"
            echo ""
            echo "### рџЏ·пёЏ Breakdown by state"
            echo ""
            echo "| State | Count |"
            echo "| --- | --- |"
            echo "| рџџў Open | $count_open |"
            echo "| рџџЎ Closed (active since cutoff) | $count_closed_recent |"
            echo "| рџ”ґ Closed (inactive, eligible) | $count_closed_stale |"
            echo "| вљЄ Unknown | $count_unknown |"
            if [ -n "$oldest_updated" ] && [ "$remaining" -gt 0 ] \
                && { [ "$oldest_updated" \> "$cutoff" ] || [ "$oldest_updated" = "$cutoff" ]; }; then
              echo ""
              echo "> [!WARNING]"
              echo "> Oldest activity seen in this batch: \`$oldest_updated\` (cutoff: \`$cutoff\`)."
              echo "> The notification API does not sort by issue activity, so the current"
              echo "> batch of $total threads did not reach any old-enough candidates."
              echo "> Consider increasing \`batch-size\` (currently $BATCH_SIZE) or running manually"
              echo "> with a larger batch to clear the backlog faster."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$found" -gt 0 ]; then
            {
              echo ""
              echo "---"
              echo ""
              echo "### рџ“ќ Details"
              echo ""
              echo "| рџ’¬ Title | рџ”— Link | рџ•ђ Last activity | вљЎ Action |"
              echo "| --- | --- | --- | --- |"
            } >> "$GITHUB_STEP_SUMMARY"
            cat "$rows" >> "$GITHUB_STEP_SUMMARY"
          fi

          rm -f "$rows"
