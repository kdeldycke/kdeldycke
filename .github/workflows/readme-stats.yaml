name: 📈 Readme Stats
on:
  # Update daily.
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  stats:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1.1.0
        with:
          card: stats
          options: username=kdeldycke&show_icons=true&text_color=718096&hide_title=true&rank_icon=percentile
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated card
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/stats.svg
          git commit -m "Update readme stats card" || exit 0
          git push
